<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>에르덴 왕국 — 오웬 백작의 연대기</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=MedievalSharp&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap');

:root {
  --stone: #2a2218;
  --stone-mid: #3d3222;
  --stone-light: #574838;
  --parchment: #f2e8d0;
  --parchment-dim: #c8b48a;
  --parchment-dark: #a08c60;
  --gold: #c9973a;
  --gold-light: #e8bc6a;
  --gold-dark: #7a5518;
  --blood: #8b1a1a;
  --blood-light: #b83232;
  --iron: #4a5568;
  --iron-light: #718096;
  --forest: #2d5a27;
  --forest-light: #4a8c42;
  --shadow: rgba(0,0,0,0.7);
  --glow: rgba(201,151,58,0.2);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; }
body {
  background: var(--stone);
  color: var(--parchment);
  font-family: 'Crimson Text', serif;
  min-height: 100vh;
  background-image:
    radial-gradient(ellipse 100% 50% at 50% 0%, rgba(201,151,58,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 60% 60% at 0% 100%, rgba(139,26,26,0.1) 0%, transparent 50%),
    url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23c9973a' fill-opacity='0.018'%3E%3Crect x='0' y='0' width='1' height='100'/%3E%3Crect x='50' y='0' width='1' height='100'/%3E%3Crect x='0' y='0' width='100' height='1'/%3E%3Crect x='0' y='50' width='100' height='1'/%3E%3C/g%3E%3C/svg%3E");
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-bottom: 40px;
}

/* ── HEADER ── */
.hdr {
  width: 100%; max-width: 720px;
  padding: 18px 18px 10px;
  text-align: center;
}
.hdr-crest { font-size: 1.4rem; color: var(--gold); opacity: 0.6; letter-spacing: 0.3em; display: block; margin-bottom: 4px; }
.hdr-title {
  font-family: 'Cinzel', serif;
  font-size: clamp(1.2rem, 5vw, 1.9rem);
  font-weight: 700;
  color: var(--gold-light);
  letter-spacing: 0.06em;
  text-shadow: 0 0 30px var(--glow), 0 2px 4px var(--shadow);
}
.hdr-sub {
  font-family: 'Cinzel', serif;
  font-size: 0.65rem;
  color: var(--gold-dark);
  letter-spacing: 0.25em;
  text-transform: uppercase;
  margin-top: 3px;
}
.hdr-line { width: 160px; height: 1px; background: linear-gradient(90deg,transparent,var(--gold),transparent); margin: 10px auto 0; }

/* ── DATE BAR ── */
.date-bar {
  width: 100%; max-width: 720px;
  padding: 6px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.date-txt { font-family: 'Cinzel', serif; font-size: 0.72rem; color: var(--gold); }
.week-txt { font-size: 0.68rem; color: var(--parchment-dark); font-style: italic; }

/* ── TOP GRID ── */
.top-grid {
  width: 100%; max-width: 720px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  padding: 0 18px 8px;
}

/* ── PANEL ── */
.panel {
  background: linear-gradient(160deg, rgba(42,34,24,0.97), rgba(30,24,14,0.98));
  border: 1px solid rgba(201,151,58,0.18);
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5), inset 0 1px 0 rgba(201,151,58,0.08);
}
.panel-hdr {
  padding: 8px 12px;
  border-bottom: 1px solid rgba(201,151,58,0.1);
  font-family: 'Cinzel', serif;
  font-size: 0.58rem;
  color: var(--gold-dark);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.panel-body { padding: 10px 12px; }

/* ── STATS ── */
.stat-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
}
.stat-row:last-child { margin-bottom: 0; }
.stat-icon { font-size: 0.85rem; width: 18px; text-align: center; flex-shrink: 0; }
.stat-name { font-family: 'Cinzel', serif; font-size: 0.6rem; color: var(--parchment-dark); width: 36px; flex-shrink: 0; }
.stat-bar-bg { flex: 1; height: 4px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; }
.stat-bar-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--gold-dark), var(--gold-light)); transition: width 0.5s ease; }
.stat-num { font-family: 'Cinzel', serif; font-size: 0.72rem; color: var(--gold-light); width: 24px; text-align: right; flex-shrink: 0; }

/* ── OUTLOOK (인생관) ── */
.outlook-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 0;
  border-bottom: 1px solid rgba(201,151,58,0.06);
}
.outlook-row:last-child { border-bottom: none; }
.outlook-icon { font-size: 1rem; width: 20px; text-align: center; }
.outlook-info { flex: 1; }
.outlook-name { font-family: 'Cinzel', serif; font-size: 0.65rem; color: var(--parchment); display: block; }
.outlook-stars { display: flex; gap: 2px; margin-top: 2px; }
.star { font-size: 0.6rem; color: var(--gold); }
.star.empty { color: rgba(201,151,58,0.2); }

/* ── DOMAIN ── */
.domain-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.domain-item { text-align: center; }
.domain-label { font-family: 'Cinzel', serif; font-size: 0.52rem; color: var(--gold-dark); text-transform: uppercase; letter-spacing: 0.1em; display: block; margin-bottom: 2px; }
.domain-val { font-size: 1rem; font-family: 'Cinzel', serif; color: var(--gold-light); font-weight: 700; display: block; }
.domain-bar-bg { height: 3px; background: rgba(255,255,255,0.06); border-radius: 2px; margin-top: 3px; overflow: hidden; }
.domain-bar-fill { height: 100%; border-radius: 2px; transition: width 0.5s; }
.bar-dev { background: linear-gradient(90deg, var(--forest), var(--forest-light)); }
.bar-loy { background: linear-gradient(90deg, var(--blood), var(--blood-light)); }

/* ── RESOURCES ── */
.res-row { display: flex; justify-content: space-between; margin-bottom: 5px; }
.res-row:last-child { margin-bottom: 0; }
.res-label { font-size: 0.65rem; color: var(--parchment-dark); }
.res-val { font-family: 'Cinzel', serif; font-size: 0.7rem; color: var(--parchment); }
.res-val.danger { color: var(--blood-light); }
.res-val.good { color: var(--forest-light); }

/* ── NPC ROW ── */
.npc-strip {
  width: 100%; max-width: 720px;
  padding: 0 18px 8px;
  display: flex;
  gap: 6px;
  overflow-x: auto;
  scrollbar-width: none;
}
.npc-strip::-webkit-scrollbar { display: none; }
.npc-card {
  flex-shrink: 0;
  background: rgba(42,34,24,0.9);
  border: 1px solid rgba(201,151,58,0.12);
  border-radius: 8px;
  padding: 8px 10px;
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
  min-width: 130px;
}
.npc-card:hover { border-color: rgba(201,151,58,0.35); background: rgba(60,48,32,0.9); }
.npc-card.allied { border-color: rgba(74,140,66,0.4); }
.npc-card.hostile { border-color: rgba(184,50,50,0.4); }
.npc-avatar { font-size: 1.3rem; width: 30px; text-align: center; }
.npc-info { flex: 1; min-width: 0; }
.npc-name { font-family: 'Cinzel', serif; font-size: 0.65rem; color: var(--parchment); display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.npc-rel-label { font-size: 0.58rem; color: var(--parchment-dark); display: block; margin-top: 1px; }
.npc-rel-bar { height: 2px; background: rgba(255,255,255,0.06); border-radius: 1px; margin-top: 3px; overflow: hidden; }
.npc-rel-fill { height: 100%; border-radius: 1px; transition: width 0.4s; background: linear-gradient(90deg, var(--gold-dark), var(--gold-light)); }
.npc-rel-fill.hostile-fill { background: linear-gradient(90deg, #6b1010, var(--blood-light)); }

/* ── MAIN PANEL ── */
.main-wrap {
  width: 100%; max-width: 720px;
  padding: 0 18px 8px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

/* ── SCHEDULE ── */
.schedule-panel { }
.schedule-days {
  display: flex;
  gap: 4px;
  padding: 8px 12px;
  border-bottom: 1px solid rgba(201,151,58,0.08);
  overflow-x: auto;
  scrollbar-width: none;
}
.schedule-days::-webkit-scrollbar { display: none; }
.day-slot {
  flex-shrink: 0;
  width: 34px; height: 34px;
  border-radius: 5px;
  border: 1px solid rgba(201,151,58,0.15);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-size: 0.9rem;
  background: rgba(255,255,255,0.02);
  position: relative;
  cursor: pointer;
  transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.day-slot.filled { border-color: rgba(201,151,58,0.35); background: rgba(201,151,58,0.06); }
.day-slot.empty { border-style: dashed; }
.day-slot:hover { border-color: rgba(201,151,58,0.5); }
.day-num { font-family: 'Cinzel', serif; font-size: 0.42rem; color: var(--gold-dark); position: absolute; top: 2px; left: 3px; }
.day-icon { font-size: 1rem; }

.days-remaining {
  font-family: 'Cinzel', serif;
  font-size: 0.58rem;
  color: var(--gold-dark);
  padding: 0 12px 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.confirm-btn {
  background: linear-gradient(135deg, var(--gold-dark), var(--gold));
  border: none;
  border-radius: 6px;
  padding: 5px 12px;
  color: var(--stone);
  font-family: 'Cinzel', serif;
  font-size: 0.62rem;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.05em;
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.confirm-btn:hover { transform: scale(1.03); box-shadow: 0 3px 12px rgba(201,151,58,0.3); }
.confirm-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

/* ── ACTION LIST ── */
.action-cats { display: flex; gap: 4px; padding: 8px 12px; border-bottom: 1px solid rgba(201,151,58,0.08); overflow-x: auto; scrollbar-width: none; }
.action-cats::-webkit-scrollbar { display: none; }
.cat-btn {
  flex-shrink: 0;
  padding: 4px 10px;
  border-radius: 14px;
  border: 1px solid rgba(201,151,58,0.15);
  background: transparent;
  color: var(--parchment-dark);
  font-family: 'Cinzel', serif;
  font-size: 0.58rem;
  cursor: pointer;
  transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.cat-btn.active { background: rgba(201,151,58,0.15); border-color: rgba(201,151,58,0.4); color: var(--gold-light); }

.action-list { display: flex; flex-direction: column; }
.action-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-bottom: 1px solid rgba(201,151,58,0.05);
  cursor: pointer;
  transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
  position: relative;
}
.action-item:last-child { border-bottom: none; }
.action-item:hover { background: rgba(201,151,58,0.05); }
.action-item:active { background: rgba(201,151,58,0.1); }
.action-item.unavailable { opacity: 0.35; cursor: not-allowed; pointer-events: none; }
.action-emoji { font-size: 1.1rem; flex-shrink: 0; }
.action-content { flex: 1; }
.action-name { font-family: 'Cinzel', serif; font-size: 0.7rem; color: var(--parchment); display: block; margin-bottom: 1px; }
.action-desc { font-size: 0.62rem; color: var(--parchment-dark); font-style: italic; }
.action-days {
  display: flex;
  gap: 2px;
  flex-shrink: 0;
}
.day-pip { width: 6px; height: 6px; border-radius: 1px; background: var(--gold-dark); }

/* ── EVENT PANEL ── */
.event-panel { }
.event-location { font-family: 'Cinzel', serif; font-size: 0.58rem; color: var(--gold-dark); letter-spacing: 0.15em; text-transform: uppercase; }
.event-speaker-row { display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px 6px; }
.event-avatar { width: 40px; height: 40px; border-radius: 50%; border: 1.5px solid var(--gold-dark); background: var(--stone-mid); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; flex-shrink: 0; }
.event-meta { flex: 1; }
.event-speaker-name { font-family: 'Cinzel', serif; font-size: 0.78rem; color: var(--gold-light); font-weight: 600; display: block; }
.event-speaker-role { font-size: 0.62rem; color: var(--gold-dark); font-style: italic; }
.event-body { padding: 4px 12px 12px; font-size: clamp(0.82rem,3vw,0.92rem); line-height: 1.85; color: var(--parchment); min-height: 60px; }
.event-body em { color: var(--gold-light); font-style: italic; }
.event-body .danger { color: var(--blood-light); font-style: italic; }

/* ── CHOICES ── */
.choices-wrap { padding: 0 12px 12px; display: flex; flex-direction: column; gap: 6px; }
.choice-btn {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 9px 12px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(201,151,58,0.18);
  border-radius: 7px;
  color: var(--parchment);
  font-family: 'Crimson Text', serif;
  font-size: clamp(0.78rem,3vw,0.86rem);
  text-align: left;
  cursor: pointer;
  transition: all 0.18s;
  -webkit-tap-highlight-color: transparent;
  position: relative;
  overflow: hidden;
}
.choice-btn::before { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg,rgba(201,151,58,0.07),transparent); opacity: 0; transition: opacity 0.18s; }
.choice-btn:hover::before { opacity: 1; }
.choice-btn:hover { border-color: rgba(201,151,58,0.4); transform: translateX(2px); }
.choice-btn:active { transform: scale(0.99); }
.choice-icon { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }
.choice-text { flex: 1; line-height: 1.5; }
.choice-hint { display: block; font-size: 0.62rem; color: var(--gold-dark); margin-top: 2px; font-style: italic; }

/* ── LOG ── */
.log-wrap { width: 100%; max-width: 720px; padding: 4px 18px 20px; }
.log-title { font-family: 'Cinzel', serif; font-size: 0.55rem; color: var(--gold-dark); letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 6px; }
.log-entry { font-size: 0.68rem; color: rgba(194,180,138,0.45); padding: 3px 8px; border-left: 1px solid rgba(201,151,58,0.1); font-style: italic; margin-bottom: 3px; line-height: 1.5; animation: logIn 0.3s ease; }
.log-entry.imp { color: rgba(201,151,58,0.6); border-left-color: rgba(201,151,58,0.3); }
@keyframes logIn { from{opacity:0;transform:translateX(-4px)} to{opacity:1;transform:none} }

/* ── NPC POPUP ── */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.3s; padding: 20px; }
.overlay.show { opacity: 1; pointer-events: all; }
.popup { background: linear-gradient(160deg,#2a2218,#1e1810); border: 1px solid rgba(201,151,58,0.3); border-radius: 14px; padding: 22px 18px; max-width: 360px; width: 100%; transform: scale(0.92); transition: transform 0.3s; box-shadow: 0 0 40px rgba(0,0,0,0.7); }
.overlay.show .popup { transform: scale(1); }
.popup-avatar { font-size: 2.5rem; text-align: center; margin-bottom: 8px; }
.popup-name { font-family: 'Cinzel', serif; font-size: 1rem; color: var(--gold-light); font-weight: 700; text-align: center; display: block; margin-bottom: 2px; }
.popup-role { font-size: 0.7rem; color: var(--gold-dark); text-align: center; font-style: italic; display: block; margin-bottom: 10px; }
.popup-rel-bar { height: 4px; background: rgba(255,255,255,0.06); border-radius: 2px; margin-bottom: 4px; overflow: hidden; }
.popup-rel-fill { height: 100%; border-radius: 2px; transition: width 0.5s; }
.popup-rel-label { font-size: 0.62rem; color: var(--parchment-dark); text-align: center; margin-bottom: 10px; }
.popup-bio { font-size: 0.78rem; line-height: 1.7; color: var(--parchment-dim); margin-bottom: 12px; }
.popup-schedule { font-size: 0.68rem; color: var(--gold-dark); font-style: italic; margin-bottom: 14px; }
.popup-close { width: 100%; padding: 9px; background: rgba(201,151,58,0.08); border: 1px solid rgba(201,151,58,0.2); border-radius: 7px; color: var(--gold-light); font-family: 'Cinzel', serif; font-size: 0.75rem; cursor: pointer; transition: all 0.2s; }
.popup-close:hover { background: rgba(201,151,58,0.16); }

/* ── HEIR POPUP ── */
.heir-section { padding: 8px 12px; border-top: 1px solid rgba(201,151,58,0.08); }
.heir-row { display: flex; align-items: center; gap: 8px; }
.heir-avatar { font-size: 1.2rem; }
.heir-info { flex: 1; }
.heir-name { font-family: 'Cinzel', serif; font-size: 0.68rem; color: var(--parchment); display: block; }
.heir-detail { font-size: 0.58rem; color: var(--parchment-dark); font-style: italic; }
.no-heir { font-size: 0.68rem; color: var(--blood-light); font-style: italic; }

/* ── OUTCOME ── */
.outcome-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 300; opacity: 0; pointer-events: none; transition: opacity 0.5s; padding: 24px; }
.outcome-overlay.show { opacity: 1; pointer-events: all; }
.outcome-card { background: linear-gradient(160deg,#2a2218,#1a1208); border: 1px solid var(--gold); border-radius: 16px; padding: 28px 22px; max-width: 380px; width: 100%; text-align: center; box-shadow: 0 0 60px rgba(201,151,58,0.15); transform: scale(0.9); transition: transform 0.4s; }
.outcome-overlay.show .outcome-card { transform: scale(1); }
.out-icon { font-size: 3rem; margin-bottom: 10px; display: block; }
.out-title { font-family: 'Cinzel', serif; font-size: 1.2rem; color: var(--gold-light); font-weight: 700; margin-bottom: 10px; }
.out-body { font-size: 0.84rem; line-height: 1.75; color: var(--parchment-dim); margin-bottom: 18px; }
.restart-btn { background: linear-gradient(135deg,var(--gold-dark),var(--gold)); border: none; border-radius: 8px; padding: 11px 26px; color: var(--stone); font-family: 'Cinzel', serif; font-size: 0.85rem; font-weight: 700; cursor: pointer; letter-spacing: 0.05em; transition: all 0.2s; }
.restart-btn:hover { transform: scale(1.04); }

.flash-border { animation: flashBorder 0.5s ease; }
@keyframes flashBorder { 0%,100%{box-shadow:0 4px 20px rgba(0,0,0,0.5)} 50%{box-shadow:0 4px 20px rgba(0,0,0,0.5),0 0 20px rgba(201,151,58,0.2)} }

.tag-good { color: #4a8c42; font-size: 0.62rem; font-family: 'Cinzel', serif; }
.tag-bad { color: var(--blood-light); font-size: 0.62rem; font-family: 'Cinzel', serif; }
</style>
</head>
<body>

<header class="hdr">
  <span class="hdr-crest">✦ ✦ ✦</span>
  <div class="hdr-title">에르덴 왕국</div>
  <div class="hdr-sub">오웬 백작의 연대기</div>
  <div class="hdr-line"></div>
</header>

<div class="date-bar">
  <span class="date-txt" id="dateTxt">—</span>
  <span class="week-txt" id="weekTxt">—</span>
</div>

<!-- TOP GRID -->
<div class="top-grid">
  <!-- 능력치 -->
  <div class="panel">
    <div class="panel-hdr"><span>백작 오웬</span><span id="ageDisplay" style="color:var(--parchment-dark);font-size:0.6rem;"></span></div>
    <div class="panel-body" id="statsBody"></div>
  </div>
  <!-- 영지 -->
  <div class="panel">
    <div class="panel-hdr"><span>카스텔 영지</span></div>
    <div class="panel-body">
      <div class="domain-grid">
        <div class="domain-item">
          <span class="domain-label">개발도</span>
          <span class="domain-val" id="devVal">—</span>
          <div class="domain-bar-bg"><div class="domain-bar-fill bar-dev" id="devBar" style="width:0%"></div></div>
        </div>
        <div class="domain-item">
          <span class="domain-label">충성도</span>
          <span class="domain-val" id="loyVal">—</span>
          <div class="domain-bar-bg"><div class="domain-bar-fill bar-loy" id="loyBar" style="width:0%"></div></div>
        </div>
      </div>
      <div style="margin-top:10px;">
        <div class="res-row"><span class="res-label">⚜️ 세수</span><span class="res-val" id="resGold">—</span></div>

  library:  { name: '도서관',      icon: '📚', cost: 250, devReq: 3, effect: { heirEdu: 20 } },
};

function getResources() {
  let gold = G.baseGold, food = G.baseFood, troop = G.baseTroop, def = G.baseDef;
  for (const b of G.buildings) {
    const bd = BUILDINGS[b];
    if (!bd) continue;
    if (bd.effect.gold)  gold  += Math.round(G.baseGold  * bd.effect.gold  / 100);
    if (bd.effect.food)  food  += Math.round(G.baseFood  * bd.effect.food  / 100);
    if (bd.effect.troop) troop += Math.round(G.baseTroop * bd.effect.troop / 100);
    if (bd.effect.def)   def   += Math.round(G.baseDef   * bd.effect.def   / 100);
  }
  return { gold, food, troop, def };
}

function renderSchedule() {
  const daysEl = document.getElementById('scheduleDays');
  daysEl.innerHTML = '';
  let filled = 0;
  for (const entry of G.schedule) {
    const a = ACTIONS[entry.actionKey];
    for (let i = 0; i < entry.days; i++) {
      const slot = document.createElement('div');
      slot.className = 'day-slot filled';
      slot.innerHTML = `<span class="day-num">${filled+1}</span><span class="day-icon">${a.icon}</span>`;
      slot.title = a.name;
      slot.onclick = () => removeScheduleEntry(entry.actionKey);
      daysEl.appendChild(slot);
      filled++;
    }
  }
  for (let i = filled; i < 7; i++) {
    const slot = document.createElement('div');
    slot.className = 'day-slot empty';
    slot.innerHTML = `<span class="day-num">${i+1}</span><span style="font-size:0.6rem;color:rgba(201,151,58,0.2);">—</span>`;
    daysEl.appendChild(slot);
  }
  const remain = 7 - G.scheduleDaysUsed;
  document.getElementById('daysRemain').innerHTML = `남은 일수: <strong style="color:var(--gold-light);">${remain}</strong>일`;
  document.getElementById('confirmBtn').disabled = remain !== 0;
  document.getElementById('schedInfo').textContent = remain === 0 ? '✓ 확정 가능' : `${remain}일 남음`;
}

function renderActionList() {
  // 탭
  const catsEl = document.getElementById('actionCats');
  catsEl.innerHTML = '';
  CATS.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (activeCat === c.key ? ' active' : '');
    btn.textContent = c.label;
    btn.onclick = () => { activeCat = c.key; renderActionList(); };
    catsEl.appendChild(btn);
  });

  const listEl = document.getElementById('actionList');
  listEl.innerHTML = '';
  const remain = 7 - G.scheduleDaysUsed;

  for (const [key, a] of Object.entries(ACTIONS)) {
    if (activeCat !== 'all' && a.cat !== activeCat) continue;
    const canFit = a.solo ? G.scheduleDaysUsed === 0 && a.days <= 7 : a.days <= remain;
    const alreadySolo = G.schedule.some(e => ACTIONS[e.actionKey].solo);
    const unavail = !canFit || (a.solo && G.scheduleDaysUsed > 0) || alreadySolo;

    const item = document.createElement('div');
    item.className = 'action-item' + (unavail ? ' unavailable' : '');
    const pips = '<div class="day-pip"></div>'.repeat(a.days);
    item.innerHTML = `<span class="action-emoji">${a.icon}</span><span class="action-content"><span class="action-name">${a.name}</span><span class="action-desc">${a.desc}</span></span><span class="action-days">${pips}</span>`;
    if (!unavail) item.onclick = () => addScheduleEntry(key);
    listEl.appendChild(item);
  }
}

// ═══════════════════════════════════
// SCHEDULE LOGIC
// ═══════════════════════════════════
function addScheduleEntry(key) {
  const a = ACTIONS[key];
  const remain = 7 - G.scheduleDaysUsed;
  if (a.days > remain) return;
  if (a.solo && G.scheduleDaysUsed > 0) return;
  G.schedule.push({ actionKey: key, days: a.days });
  G.scheduleDaysUsed += a.days;
  renderSchedule();
  renderActionList();
}

function removeScheduleEntry(key) {
  const idx = G.schedule.findIndex(e => e.actionKey === key);
  if (idx === -1) return;
  G.scheduleDaysUsed -= G.schedule[idx].days;
  G.schedule.splice(idx, 1);
  renderSchedule();
  renderActionList();
}

function confirmSchedule() {
  if (G.scheduleDaysUsed !== 7) return;
  if (G.currentEvent) return;

  // 행동 처리
  const actionsDone = [];
  for (const entry of G.schedule) {
    actionsDone.push(entry.actionKey);
    const a = ACTIONS[entry.actionKey];

    // 능력치 카운트
    if (a.statKey) {
      G.statCount[a.statKey]++;
      if (G.statCount[a.statKey] >= 30) {
        G.statCount[a.statKey] = 0;
        G.stats[a.statKey] = Math.min(50, G.stats[a.statKey] + 1);
        addLog(`${STAT_META[a.statKey].label} 능력이 향상됐다. (${G.stats[a.statKey]})`, true);
      }
    }

    // 특수 행동
    if (entry.actionKey === 'admin') {
      // 개발도 카운트 (별도 관리)
      G._devCount = (G._devCount||0) + 1;
      if (G._devCount >= 8) { G._devCount = 0; G.domain.dev = Math.min(10, G.domain.dev+1); addLog(`영지 개발도가 ${G.domain.dev}로 올랐다.`, true); }
    }
    if (entry.actionKey === 'rest') {
      G.health = Math.min(100, G.health + 5);
    }
    if (entry.actionKey === 'heirEdu' && G.heir && !G.heir.outlook) {
      const focusKeys = Object.keys(G.heir.eduFocus);
      const focusKey = entry.statKey || 'admin';
      G.heir.eduFocus[G.outlook.type] = (G.heir.eduFocus[G.outlook.type]||0) + 1;
      // 인생관 확정 (18세)
      if (G.heir.age >= 18) confirmHeirOutlook();
    }
  }

  // 시간 경과
  G.week++;
  G.totalWeeks++;
  if (G.week > 4) { G.week = 1; G.month++; }
  if (G.month > 12) { G.month = 1; G.year++; }

  // 나이
  if (G.totalWeeks % 52 === 0) {
    G.age++;
    if (G.heir) G.heir.age++;
    if (G.heir && G.heir.age >= 18 && !G.heir.outlook) confirmHeirOutlook();
    G.health = Math.max(0, G.health - (G.age > 50 ? 5 : 1));
    addLog(`${G.age}세가 됐다.`);
    if (G.age > 55 && G.health < 30) {
      addLog('건강이 급격히 나빠지고 있다.', true);
    }
  }

  // 사망 체크
  if (G.health <= 0 || G.age >= 75) {
    if (!G.heir) { endGame('no_heir'); return; }
    succeedHeir();
    return;
  }

  // 게임오버 체크
  if (G.domain.loyalty <= 0) { endGame('revolt'); return; }

  // 트리거 이벤트 체크
  for (const actionKey of actionsDone) {
    const pool = EVENT_POOL.trigger[actionKey];
    if (pool && Math.random() < 0.55) {
      const ev = pool[Math.floor(Math.random() * pool.length)];
      G.pendingEvents.push(ev);
    }
  }

  // 월드 이벤트 체크
  for (const wev of EVENT_POOL.world) {
    if (!firedWorldEvents.has(wev.id) && G.totalWeeks >= wev.minWeek && Math.random() < 0.3) {
      G.pendingEvents.push(wev);
      firedWorldEvents.add(wev.id);
    }
  }

  // 스케줄 초기화
  G.schedule = [];
  G.scheduleDaysUsed = 0;

  renderDate();
  renderStats();
  renderDomain();
  renderNPCs();
  renderSchedule();
  renderActionList();

  // 이벤트 처리
  if (G.pendingEvents.length > 0) {
    showEvent(G.pendingEvents.shift());
  }
}

function showEvent(ev) {
  G.currentEvent = ev;
  document.getElementById('schedulePanel').style.opacity = '0.3';
  document.getElementById('schedulePanel').style.pointerEvents = 'none';
  const ep = document.getElementById('eventPanel');
  ep.style.display = '';
  document.getElementById('eventLabel').textContent = ev.label;
  document.getElementById('eventLoc').textContent = ev.loc;
  document.getElementById('eventAvatar').textContent = ev.avatar;
  document.getElementById('eventSpeaker').textContent = ev.speaker;
  document.getElementById('eventRole').textContent = ev.role;
  document.getElementById('eventBody').innerHTML = ev.text.replace(/\n/g,'<br>');

  const cw = document.getElementById('choicesWrap');
  cw.innerHTML = '';
  ev.choices.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    let hintHtml = '';
    if (c.statKey) {
      const val = G.stats[c.statKey];
      const outlook_bonus = G.outlook.type === c.statKey ? G.outlook.stars : 0;
      const total = val + outlook_bonus;
      const chance = Math.min(95, Math.max(10, Math.round(((total - c.threshold) / c.threshold) * 60 + 50)));
      hintHtml = `<span class="choice-hint">${c.hint} · ${STAT_META[c.statKey].label} ${total} vs ${c.threshold} (성공률 약 ${chance}%)</span>`;
    } else {
      hintHtml = `<span class="choice-hint">${c.hint||''}</span>`;
    }
    btn.innerHTML = `<span class="choice-icon">${c.icon}</span><span class="choice-text">${c.text}${hintHtml}</span>`;
    btn.onclick = () => resolveChoice(c);
    cw.appendChild(btn);
  });

  ep.classList.add('flash-border');
  ep.scrollIntoView({ behavior:'smooth', block:'nearest' });
}

function resolveChoice(c) {
  if (c.statKey) {
    const val = G.stats[c.statKey];
    const bonus = G.outlook.type === c.statKey ? G.outlook.stars : 0;
    const total = val + bonus;
    const chance = Math.min(0.95, Math.max(0.1, ((total - c.threshold) / c.threshold) * 0.6 + 0.5));
    if (Math.random() < chance) {
      if (c.success) c.success(G);
    } else {
      if (c.fail) c.fail(G);
    }
  } else {
    if (c.fn) c.fn(G);
  }

  G.currentEvent = null;
  document.getElementById('eventPanel').style.display = 'none';
  document.getElementById('schedulePanel').style.opacity = '';
  document.getElementById('schedulePanel').style.pointerEvents = '';

  renderStats();
  renderDomain();
  renderNPCs();

  if (G.domain.loyalty <= 0) { endGame('revolt'); return; }

  if (G.pendingEvents.length > 0) {
    setTimeout(() => showEvent(G.pendingEvents.shift()), 400);
  }
}

// ═══════════════════════════════════
// 후계자
// ═══════════════════════════════════
function confirmHeirOutlook() {
  if (!G.heir || G.heir.outlook) return;
  const focus = G.heir.eduFocus;
  let best = 'admin', bestVal = -1;
  for (const [k,v] of Object.entries(focus)) {
    if (v > bestVal) { bestVal = v; best = k; }
  }
  const stars = Math.min(4, Math.max(1, Math.floor(bestVal / 3) + 1));
  G.heir.outlook = { type: best, stars };
  addLog(`후계자 ${G.heir.name}의 인생관이 확정됐다. ${OUTLOOK_META[best].label} ${stars}성`, true);
}

function succeedHeir() {
  addLog(`오웬 백작이 ${G.age}세로 생을 마쳤다. 후계자 ${G.heir.name}이 백작위를 계승한다.`, true);
  const newOutlook = G.heir.outlook || { type: 'admin', stars: 1 };
  G.stats = { combat:5, diplomacy:5, intrigue:5, admin:5, learning:5 };
  G.statCount = { combat:0, diplomacy:0, intrigue:0, admin:0, learning:0 };
  G.outlook = newOutlook;
  G.age = 18;
  G.health = 90;
  // NPC 관계 초기화
  for (const npc of Object.values(G.npcs)) npc.rel = 30 + Math.floor(Math.random()*20);
  G.heir = null;
  renderStats();
  renderDomain();
  renderNPCs();
}

// ═══════════════════════════════════
// NPC POPUP
// ═══════════════════════════════════
function showNpcPopup(key) {
  const npc = G.npcs[key];
  document.getElementById('popAvatar').textContent = npc.avatar;
  document.getElementById('popName').textContent = npc.name;
  document.getElementById('popRole').textContent = npc.title;
  document.getElementById('popBio').textContent = npc.bio;
  const rel = npc.rel;
  const fill = document.getElementById('popRelFill');
  fill.style.width = rel + '%';
  fill.style.background = rel >= 65 ? 'linear-gradient(90deg,#2d5a27,#4a8c42)' : rel <= 30 ? 'linear-gradient(90deg,#6b1010,#b83232)' : 'linear-gradient(90deg,var(--gold-dark),var(--gold-light))';
  const relTxt = rel >= 65 ? '우호적' : rel <= 30 ? '적대적' : '중립';
  document.getElementById('popRelLabel').textContent = `관계도 ${rel} — ${relTxt}`;
  const weekIdx = G.totalWeeks % (npc.schedule.length||1);
  document.getElementById('popSchedule').textContent = `이번 주 일정: ${npc.schedule[weekIdx] || '—'}`;
  document.getElementById('npcOverlay').classList.add('show');
}

function closePopup(e, id) { if (e.target === document.getElementById(id)) closePopupById(id); }
function closePopupById(id) { document.getElementById(id).classList.remove('show'); }

// ═══════════════════════════════════
// LOG
// ═══════════════════════════════════
function addLog(text, imp=false) {
  G.log.unshift({ text, imp });
  if (G.log.length > 10) G.log.pop();
  const ll = document.getElementById('logList');
  ll.innerHTML = G.log.map(e => `<div class="log-entry${e.imp?' imp':''}">${e.text}</div>`).join('');
}

// ═══════════════════════════════════
// END GAME
// ═══════════════════════════════════
const ENDINGS = {
  no_heir: { icon:'💀', title:'대가 끊기다', body: g => `오웬 백작이 후계자 없이 세상을 떠났다. 카스텔 영지는 왕국에 귀속되었고, 오웬의 이름은 역사에서 지워졌다.` },
  revolt:  { icon:'🔥', title:'반란으로 무너지다', body: g => `충성도가 바닥났다. 백성과 기사들이 들고 일어났다. 오웬 백작은 자신의 성에서 쫓겨났다.` },
};

function endGame(type) {
  G.gameOver = true;
  const e = ENDINGS[type];
  document.getElementById('outIcon').textContent = e.icon;
  document.getElementById('outTitle').textContent = e.title;
  document.getElementById('outBody').textContent = e.body(G);
  document.getElementById('outcomeOverlay').classList.add('show');
}

function restart() {
  document.getElementById('outcomeOverlay').classList.remove('show');
  document.getElementById('logList').innerHTML = '';
  firedWorldEvents.clear();
  initGame();
  renderDate();
  renderStats();
  renderDomain();
  renderNPCs();
  renderSchedule();
  renderActionList();
  addLog('1200년. 오웬 백작의 연대기가 시작됐다.', true);
}

// ═══════════════════════════════════
// INIT
// ═══════════════════════════════════
initGame();
renderDate();
renderStats();
renderDomain();
renderNPCs();
renderSchedule();
renderActionList();
addLog('1200년 봄. 에르덴 왕국, 팔제스 3세는 병상에 있다.', true);
addLog('카스텔의 오웬 백작. 작은 영지, 큰 야망.');
</script>
